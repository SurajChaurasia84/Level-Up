name: level_up
description: "A premium Habit Tracker project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  json_annotation: ^4.8.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  path: ^1.8.3
  image_cropper: ^12.2.1
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
